<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: absolute;
      top: 20px;
      left: 30px;
    }

    .logo {
      color: purple;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .logo:hover {
      color: darkviolet;
    }

    main {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* text */
    .text {
      font-size: 50px;
      font-weight: bold;
      color: purple;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .letter {
      display: inline-block;
      animation: run 1s linear infinite;
    }

    /* animation delays */
    .letter:nth-child(1) { animation-delay: 0s; }
    .letter:nth-child(2) { animation-delay: 0.05s; }
    .letter:nth-child(3) { animation-delay: 0.1s; }
    .letter:nth-child(4) { animation-delay: 0.15s; }
    .letter:nth-child(5) { animation-delay: 0.2s; }
    .letter:nth-child(6) { animation-delay: 0.25s; }
    .letter:nth-child(7) { animation-delay: 0.3s; }
    .letter:nth-child(8) { animation-delay: 0.35s; }
    .letter:nth-child(9) { animation-delay: 0.4s; }
    .letter:nth-child(10) { animation-delay: 0.45s; }
    .letter:nth-child(11) { animation-delay: 0.5s; }

    @keyframes run {
      0% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* 📱 768px RESPONSIVE */
    @media (max-width: 768px) {

      header {
        left: 15px;
        top: 15px;
      }

      .logo {
        font-size: 16px;
      }

      .text {
        font-size: 28px;
        gap: 3px;
        text-align: center;
      }
    }

  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo">HM Architecture</a>
  </header>

  <main>
    <div class="text" id="text"></div>
  </main>

  <script>
    const word = "COMING SOON";
    const container = document.getElementById("text");

    word.split("").forEach(char => {
      const span = document.createElement("span");
      span.className = "letter";
      span.innerText = char === " " ? " " : char;
      container.appendChild(span);
    });
  </script>

</body>
</html>
